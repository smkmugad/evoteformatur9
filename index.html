<!DOCTYPE html>
<html>
<head>
  <script src="https://script.google.com/macros/s/AKfycbyiIoNorGtuvu09YY83sGHgz_SzA8hneBXLd2z2FzCT1HWHbMViQYCbqViBexPNufNorg/exec"></script>
</head>
<body class="bg-gray-100 font-sans">
  <div id="loginPage" class="flex justify-center items-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
      <h2 class="text-2xl font-bold mb-6 text-center">Login Pemilihan</h2>
      <input id="user" class="w-full p-2 border rounded mb-3" placeholder="Username/Email">
      <input id="pass" type="password" class="w-full p-2 border rounded mb-3" placeholder="Password">
      <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">LOGIN</button>
    </div>
  </div>

  <div id="pemilihPage" class="hidden p-10">
    <h2 class="text-2xl font-bold">Pilih 9 Formatur</h2>
    <div id="kandidatContainer" class="grid grid-cols-2 gap-4 my-6">
      <label><input type="checkbox" value="K1"> Kandidat 1</label>
    </div>
    <button onclick="kirim()" class="bg-green-600 text-white px-6 py-2 rounded">Kirim Suara</button>
  </div>

  <script>
    function login() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      google.script.run.withSuccessHandler(res => {
        if(res.status === "success") {
          document.getElementById('loginPage').classList.add('hidden');
          document.getElementById('pemilihPage').classList.remove('hidden');
        } else { alert(res.msg); }
      }).prosesLogin(u, p);
    }

    function kirim() {
      const checked = document.querySelectorAll('input:checked');
      if(checked.length !== 9) return alert("Wajib 9!");
      const pilihan = Array.from(checked).map(c => c.value);
      google.script.run.withSuccessHandler(() => {
        alert("Berhasil, Anda akan logout.");
        location.reload(); 
      }).simpanSuara(document.getElementById('user').value, pilihan);
    }
  </script>
</body>
</html>
